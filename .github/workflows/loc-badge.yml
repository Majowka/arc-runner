name: LOC Badge — generate lines-of-code SVGs

# Managed by aidevops framework.
# Majowka policy: downstream repos call organization-owned Majowka/.github reusable workflows.
# Organization-owned reusable logic lives in: Majowka/.github/.github/workflows/loc-badge-reusable.yml
# This caller is tiny on purpose — all the logic is centralised upstream.
# Update this caller only to change the trigger filters or input overrides below.
# For logic fixes, update the reusable workflow in Majowka/.github;
# your caller will pick up the change automatically (if pinned to @main).
#
# Pinning policy:
#   Downstream repos pin Majowka/.github reusable workflows to a reviewed commit
#   instead of following a mutable branch ref.
#
# What it does: runs `tokei` on the repo, generates two SVGs in
# .github/badges/ (loc-total.svg + loc-languages.svg), commits them back
# to the default branch with [skip ci]. Reference these SVGs from your
# README via the badges template (see .agents/templates/readme/badges.md.tmpl).

on:
  push:
    branches: [main]
    # Skip retriggers from the badge commit itself and from doc-only edits
    # that don't change LOC counts.
    paths-ignore:
      - '.github/badges/**'
      - '**/*.md'
      - 'docs/**'
  schedule:
    # Weekly refresh in case paths-ignore'd content actually shifts the count.
    - cron: '17 4 * * 1'
  workflow_dispatch:

# Permissions ceiling for loc-badge-reusable.yml. The reusable workflow writes
# generated badge SVGs back to the repository, so the caller must grant contents:write.
permissions:
  contents: write

jobs:
  badges:
    uses: Majowka/.github/.github/workflows/loc-badge-reusable.yml@2cef1633dd6c0ed256d5ad10e8c0e8105f2051de
    # GH#20976: `secrets: inherit` only works within the same GitHub account/org.
    # Cross-account consumers (every downstream user) must pass secrets explicitly.
    # If a new secret is added to loc-badge-reusable.yml, add it here too.
    secrets:
      SYNC_PAT: ${{ secrets.SYNC_PAT }}
    # Optional input overrides — uncomment and edit as needed:
    # with:
    #   top_n: 8
    #   extra_excludes: |
    #     fixtures/
    #     test-data/
